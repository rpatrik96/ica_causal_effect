# WS2 round r11_frontier_synthetic — is the ICA-win frontier estimator-INTRINSIC?
#
# r10 charted the frontier on housing (dense real X): ICA wins in a heavy-eps
# band, eps non-Gaussianity dominates. This round reproduces the mini-frontier on
# SYNTHETIC iid-Gaussian covariates (unlimited real rows -> clean large n, no
# bootstrap) to confirm the pattern is a property of the estimators/DGP, not of
# housing's covariance structure.
#
# 3x3 mini-frontier: eta_beta {0.5, 1.0, 2.0} x eps_beta {0.5, 1.0, 2.0}
# (heavy / Laplace / Gaussian on each axis). Fixed: synthetic X (60000 rows),
# d'=5, n=50000 (subsample w/o replacement), linear PLR, theta=1, --n_jobs 4.
# Expect: heavy-eps column wins across eta; (2,2) both-Gaussian catastrophic.
round: r11_frontier_synthetic
script: semisynth_runner.py
base_args: "--n_experiments 25 --dataset synthetic --n_components 5 --nuisance linear --n_samples 50000 --treatment_effect 1.0 --n_jobs 4"
output_flag: "--output_dir"
grid:
  eta_beta: [0.5, 1.0, 2.0]
  eps_beta: [0.5, 1.0, 2.0]
bid: 43
resources:
  cpus: 4
  memory_gb: 16
  disk_gb: 10
  max_time_s: 7200
