# WS3 sensitivity r16_gauss_eta — gradually Gaussianise the treatment noise η.
#
# Reviewer ask (iuAn/NeBn/NbV6): sensitivity to assumption violations. ICA/HOML
# assume non-Gaussian η. This sweep gradually Gaussianises η (eta_beta 0.5 super-
# heavy -> 2.0 Gaussian) and charts each estimator's RMSE = a degradation curve.
# The violation magnitude is η's excess kurtosis (gennorm): ~25 at beta=0.5, 3 at
# beta=1, 0 at beta=2.
#
# Crossed with eps_beta {0.5 heavy, 2.0 Gaussian} to show GRACEFUL vs ABRUPT:
#  * heavy eps: ICA identifies via eps, so Gaussianising eta should barely hurt
#    ICA (graceful) -- ICA's edge survives.
#  * Gaussian eps: as eta -> Gaussian BOTH sources become Gaussian -> ICA loses
#    identifiability abruptly near eta_beta=2 (the ICA non-identifiability wall).
# synthetic X, d'=5, n=10000, linear PLR, theta=1. 7 x 2 = 14 cells.
round: r16_gauss_eta
script: semisynth_runner.py
base_args: "--dataset synthetic --n_components 5 --nuisance linear --n_samples 10000 --treatment_effect 1.0 --n_experiments 20 --n_jobs 4"
output_flag: "--output_dir"
grid:
  eta_beta: [0.5, 0.75, 1.0, 1.25, 1.5, 1.75, 2.0]
  eps_beta: [0.5, 2.0]
bid: 43
resources:
  cpus: 4
  memory_gb: 16
  disk_gb: 10
  max_time_s: 3600
