# WS4 round r14_real_news20 — confirm the calibrated selector on REAL sparse X,
# including a high-dim regime.
#
# 20 Newsgroups TF-IDF (sparse text). d' {5, 200} gives both low-d and high-d real
# covariates; nonlinear {F,T} x eps {0.5,2.0} at n=2000 (news20 has ~2365 rows).
# d'=200,n=2000 -> d/n=0.1; the low-d/heavy-eps cell is ICA's regime. Tests
# threshold transfer to a sparse real-X structure across regimes.
round: r14_real_news20
script: selector_multi_runner.py
base_args: "--dataset news20 --eta_beta 1.0 --n_samples 2000 --n_experiments 12 --base_seed 3000 --n_jobs 4"
output_flag: "--output_dir"
grid:
  nonlinear: [false, true]
  eps_beta: [0.5, 2.0]
  n_components: [5, 200]
bid: 43
resources:
  cpus: 4
  memory_gb: 16
  disk_gb: 10
  max_time_s: 3600
